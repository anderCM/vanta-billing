services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vanta_billing
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanta_billing
    depends_on:
      db:
        condition: service_healthy

  test:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanta_billing
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pip install pytest httpx pytest-cov && pytest -v"
    profiles:
      - test

volumes:
  pgdata:
