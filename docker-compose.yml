services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vanta_billing
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: vanta-billing-db

  app:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanta_billing
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy
    container_name: vanta-billing-app

  test:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanta_billing
    depends_on:
      db:
        condition: service_healthy
    command: pytest -v
    profiles:
      - test

volumes:
  pgdata:
